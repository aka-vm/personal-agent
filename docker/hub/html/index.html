<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vineet's Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d0f15;--card:#161b26;--card2:#212838;--line:#2b3346;--txt:#e7ebf3;--mut:#7e889c;--green:#34c759;--red:#ff495c;--blue:#5b8cff}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);padding:28px 18px 64px;max-width:620px;margin:auto;-webkit-font-smoothing:antialiased}
  h1{font-size:1.4rem;color:#fff;letter-spacing:-.02em}
  .sub{color:var(--mut);font-size:.82rem;margin-top:3px}
  .toolbar{display:flex;gap:10px;margin:20px 0 4px}
  .toolbar button{flex:1}
  button,a.open{font:inherit;font-size:.88rem;font-weight:600;border:0;border-radius:12px;height:44px;padding:0 16px;cursor:pointer;color:var(--txt);
         background:var(--card2);transition:transform .08s,filter .15s,background .15s;display:inline-flex;align-items:center;justify-content:center;gap:7px;line-height:1;text-decoration:none}
  button:hover:not(:disabled),a.open:hover{filter:brightness(1.15)} button:active:not(:disabled),a.open:active{transform:scale(.97)} button:disabled{opacity:.55;cursor:default}
  .green{background:rgba(52,199,89,.16);color:#7ee29a} .red{background:rgba(255,73,92,.15);color:#ff8a96}
  a.open{flex:1;background:rgba(91,140,255,.16);color:#9bbcff}
  a.open.dis{opacity:.4;pointer-events:none}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px 16px;margin:13px 0}
  .head{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .up{background:var(--green);box-shadow:0 0 7px rgba(52,199,89,.6)} .down{background:#525a6b} .partial{background:#e0a83a}
  .nm{flex:1;font-weight:650;font-size:1.05rem}
  .badge{font-size:9.5px;font-weight:600;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-left:8px;letter-spacing:.05em}
  .state{font-size:.74rem;color:var(--mut);text-transform:capitalize}
  .row{display:flex;gap:10px}
  .row button,.row a{flex:1}
  .pending .dot{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .sec{margin:24px 0 4px;font-size:.72rem;color:var(--mut);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
  .sel{width:100%;height:40px;border-radius:10px;background:var(--card2);color:var(--txt);border:1px solid var(--line);padding:0 10px;font:inherit;font-size:.85rem;appearance:none;-webkit-appearance:none}
  .foot{color:var(--mut);font-size:.78rem;margin-top:20px;line-height:1.55}
</style></head><body>
<h1>⚙️ Vineet's Hub</h1>
<div class="sub">Your services — open or control them on your tailnet.</div>

<div class="toolbar">
  <button class="green" onclick="g('on',this)">▶ Start all</button>
  <button class="red" onclick="g('off',this)">⏹ Stop optional</button>
</div>

<div id="services"></div>

<div class="sec">Apps</div>
<div class="card">
  <div class="head">
    <span class="dot up"></span>
    <span class="nm">📞 Escape call</span>
    <span class="state" id="esc-state">pick when to ring</span>
  </div>
  <select id="esc-scenario" class="sel">
    <option value="generic">Friend — "need to talk"</option>
    <option value="mom">Mom — "come home"</option>
    <option value="boss">Boss — "urgent at work"</option>
    <option value="reminder">Reminder — "leave now"</option>
  </select>
  <select id="esc-phone" class="sel" style="margin-top:8px"></select>
  <div class="row" style="margin-top:10px">
    <button onclick="escape(15,this)">15s</button>
    <button onclick="escape(60,this)">1 min</button>
    <button onclick="escape(120,this)">2 min</button>
    <button onclick="escape(300,this)">5 min</button>
  </div>
</div>
<div id="apps"></div>

<div class="foot"><b>Open</b> launches the service on your tailnet. <b>Stop optional</b> idles
non-core services (Home Assistant &amp; WhatsApp bridge always stay up).</div>

<script>
let pending = {};
const url = p => `http://${location.hostname}:${p}`;

async function load(){
  const S = await (await fetch('/api/status')).json();
  const ph = document.getElementById('esc-phone');
  if (ph && S.phones && !ph.dataset.filled){
    ph.innerHTML = S.phones.map(p=>`<option value="${p.id}">📱 ${p.label}</option>`).join('');
    ph.dataset.filled = '1';
  }
  const wrap = document.getElementById('services'); wrap.innerHTML = '';
  for (const [k,v] of Object.entries(S.services||{})){
    const up = v.state==='up', pend = pending[k];
    const open = v.web
      ? `<a class="open ${up?'':'dis'}" href="${url(v.port)}" target="_blank">🔗 Open</a>`
      : ``;
    wrap.innerHTML += `<div class="card ${pend?'pending':''}">
      <div class="head">
        <span class="dot ${v.state}"></span>
        <span class="nm">${v.label}${v.core?'<span class=badge>CORE</span>':''}</span>
        <span class="state">${pend?'working…':v.state}</span>
      </div>
      <div class="row">
        ${open}
        <button class="${up?'red':'green'}" ${pend?'disabled':''} onclick="svc('${k}','${up?'stop':'start'}',this)">
          ${pend?'<span class=spin></span>':(up?'Stop':'Start')}</button>
      </div>
    </div>`;
  }
}
async function svc(k,a,btn){
  pending[k]=true; btn.disabled=true; btn.innerHTML='<span class=spin></span>';
  load();
  await fetch('/api/services/'+k+'/'+a,{method:'POST'});
  setTimeout(()=>{ delete pending[k]; load(); }, 1800);
}
async function g(a,btn){
  const t=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class=spin></span>';
  await fetch('/api/global/'+a,{method:'POST'});
  setTimeout(()=>{ btn.disabled=false; btn.innerHTML=t; load(); }, 2800);
}
async function escape(delay, btn){
  const scenario = document.getElementById('esc-scenario').value;
  const phone = document.getElementById('esc-phone').value;
  const st = document.getElementById('esc-state');
  const t = btn.textContent; btn.disabled = true; btn.innerHTML = '<span class=spin></span>';
  try{
    const r = await fetch('/api/escape-call', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({delay, scenario, phone})});
    const j = await r.json();
    st.textContent = j.ok ? `📞 ringing in ${delay<60?delay+'s':delay/60+' min'}…`
                          : ('⚠️ ' + (j.error || 'failed'));
  }catch(e){ st.textContent = '⚠️ error'; }
  btn.disabled = false; btn.textContent = t;
}

// Always-on static apps (served by Tailscale, not Docker — no start/stop).
const APPS = [
  {label:'STFU', url:'https://vineet.werewolf-platy.ts.net:8443/', note:'mic playback, ~2s delay'},
];
function renderApps(){
  document.getElementById('apps').innerHTML = APPS.map(a => `<div class="card">
    <div class="head">
      <span class="dot up"></span>
      <span class="nm">${a.label}</span>
      <span class="state">${a.note||''}</span>
    </div>
    <div class="row"><a class="open" href="${a.url}" target="_blank">🔗 Open</a></div>
  </div>`).join('');
}
renderApps();
load(); setInterval(()=>{ if(!Object.keys(pending).length) load(); }, 8000);
</script></body></html>
