# :80 — the dashboard (control UI + /api proxy). NEVER tunneled by ngrok.
server {
    listen 80 default_server;
    location /api/ {
        proxy_pass http://127.0.0.1:8090/api/;
    }
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

# :8081 — the public gateway. ngrok points HERE. Path-routes services only;
# the dashboard is not reachable through this server.
server {
    listen 8081;
    location = / { default_type text/plain; return 200 "Pi gateway — /excalidraw/ /karakeep/ /n8n/ /homeassistant/\n"; }

    location /excalidraw/    { proxy_pass http://127.0.0.1:5001/; include /etc/nginx/proxy_ws.conf; }
    location /karakeep/      { proxy_pass http://127.0.0.1:3000/; include /etc/nginx/proxy_ws.conf; }
    location /n8n/           { proxy_pass http://127.0.0.1:5678/; include /etc/nginx/proxy_ws.conf; }
    location /homeassistant/ { proxy_pass http://127.0.0.1:8123/; include /etc/nginx/proxy_ws.conf; }
}
