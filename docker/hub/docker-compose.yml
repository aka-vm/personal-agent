services:
  hub:
    image: nginx:alpine
    container_name: hub
    restart: unless-stopped
    network_mode: host          # so nginx can reach 127.0.0.1 service ports + bind :80 and :8081
    volumes:
      - /home/vineet/hub/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/vineet/hub/proxy_ws.conf:/etc/nginx/proxy_ws.conf:ro
      - /home/vineet/hub/index.html:/usr/share/nginx/html/index.html:ro
