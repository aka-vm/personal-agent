<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vineet's Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#e2e8f0;padding:32px 20px;max-width:760px;margin:auto}
  h1{font-size:1.5rem;color:#f8fafc}
  .sub{color:#64748b;font-size:.85rem;margin-top:3px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}
  button{background:#262b38;color:#e2e8f0;border:0;border-radius:9px;padding:10px 15px;cursor:pointer;font-size:.9rem}
  button:hover{background:#333a4a}
  .on{background:#1f6f3f}.on:hover{background:#268049}.off{background:#7a2630}.off:hover{background:#8f2d39}
  .ngrok{background:#3a2e6b}.ngrok.active{background:#5a47a8}
  .ngbox{background:#15182040;border:1px solid #2d3148;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:.85rem}
  .ngbox a{color:#6cb0ff}
  .card{background:#1a1e29;border:1px solid #2a3042;border-radius:12px;padding:14px 16px;margin:9px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .up{background:#3fbf6f}.down{background:#6b7280}.partial{background:#d9a441}
  .nm{flex:1;font-weight:600}.core{font-size:10px;color:#8b94a7;border:1px solid #3a4255;border-radius:5px;padding:1px 6px;margin-left:6px}
  .pub{flex-basis:100%;font-size:.78rem;color:#6cb0ff;word-break:break-all;margin-top:2px}
  .pub a{color:#6cb0ff}
</style></head><body>
<h1>⚙️ Vineet's Hub</h1>
<div class="sub">Services, public sharing, and controls — on your tailnet.</div>

<div class="bar">
  <button class="ngrok" id="ngbtn" onclick="toggleNgrok()">🌐 Public access: …</button>
  <button class="on" onclick="g('on')">▶ Start optional</button>
  <button class="off" onclick="g('off')">⏹ Stop optional</button>
</div>
<div class="ngbox" id="ngbox" style="display:none"></div>

<div id="services"></div>
<div class="sub" style="margin-top:16px">Stopping optional services keeps core (WhatsApp bridge, Home Assistant) running. The dashboard itself is never exposed publicly.</div>

<script>
let S={};
async function load(){
  S = await (await fetch('/api/status')).json();
  const ng = S.ngrok;
  const btn=document.getElementById('ngbtn'); const box=document.getElementById('ngbox');
  btn.textContent = ng ? '🌐 Public access: ON' : '🌐 Public access: OFF';
  btn.classList.toggle('active', !!ng);
  if(ng){ box.style.display='block'; box.innerHTML = 'Public base: <a href="'+ng+'" target="_blank">'+ng+'</a><br><small>Each exposed service is at base/&lt;name&gt;/</small>'; }
  else { box.style.display='none'; }

  const wrap=document.getElementById('services'); wrap.innerHTML='';
  for(const [k,v] of Object.entries(S.services||{})){
    const up=v.state==='up';
    wrap.innerHTML += `<div class="card">
      <span class="dot ${v.state}"></span>
      <span class="nm">${v.label}${v.core?'<span class=core>core</span>':''}</span>
      <button onclick="svc('${k}','${up?'stop':'start'}')">${up?'Stop':'Start'}</button>
      ${(ng && v.public)?`<span class="pub">🌐 <a href="${v.public}" target="_blank">${v.public}</a></span>`:''}
    </div>`;
  }
}
async function svc(k,a){ await fetch('/api/services/'+k+'/'+a,{method:'POST'}); setTimeout(load,1500); }
async function g(a){ await fetch('/api/global/'+a,{method:'POST'}); setTimeout(load,2500); }
async function toggleNgrok(){
  const a = S.ngrok ? 'off':'on';
  document.getElementById('ngbtn').textContent='🌐 …';
  await fetch('/api/ngrok/'+a,{method:'POST'}); load();
}
load(); setInterval(load,8000);
</script></body></html>
